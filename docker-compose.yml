version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.4.2
    container_name: epc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: epcdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: epc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: epc-fastapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/epcdb
      - REDIS_URL=redis://redis:6379/0
      # AI Provider Secrets should be injected securely here
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    container_name: epc-celery-worker
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/epcdb
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: celery -A app.worker.celery_app worker --loglevel=info

volumes:
  pgdata:
  redis_data:
